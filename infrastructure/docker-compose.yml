version: "3.9"

# PCC AI Portal — Local Development Stack
# Services: open-webui, litellm, postgres, redis
# รันด้วย: docker compose --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: pcc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-pcc_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcc_admin} -d ${POSTGRES_DB:-pcc_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pcc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: pcc-litellm
    restart: unless-stopped
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    environment:
      # AWS credentials — add manually in production via LiteLLM UI or environment
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_REGION_NAME: ${AWS_REGION_NAME:-us-east-1}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-pcc-master-key}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pcc_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pcc_ai}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      STORE_MODEL_IN_DB: "True"
      UI_THEME: "dark"
      WEBHOOK_URL: http://backend:8000/audit/post-call
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: pcc-open-webui
    restart: unless-stopped
    volumes:
      - open_webui_data:/app/backend/data
      - ../open-webui/config/branding:/app/backend/static/branding:ro
    environment:
      # เชื่อม LiteLLM เป็น OpenAI-compatible endpoint
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-pcc-master-key}
      # ปิด Ollama เพราะไม่ใช้
      ENABLE_OLLAMA_API: "false"
      # เปิดชั่วคราวเพื่อสร้าง admin user ครั้งแรก — ปิดหลังสร้างเสร็จ
      ENABLE_SIGNUP: "true"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-changeme-webui-secret}
      # Custom branding
      WEBUI_NAME: "PCC AI Portal"
      WEBUI_URL: http://localhost:3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pcc_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pcc_ai}
    ports:
      - "3000:8080"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: pcc-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pcc_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pcc_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-pcc-master-key}
      # Azure AD — รอ IT Admin, ใส่ placeholder ก่อน
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-placeholder}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-placeholder}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-placeholder}
      # dev mode: ข้าม Azure AD validation
      AUTH_MODE: ${AUTH_MODE:-dev}
      SECRET_KEY: ${SECRET_KEY:-changeme-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      # Incident email (AI Policy Section 10)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      INCIDENT_EMAIL: ${INCIDENT_EMAIL:-ai-report@precise.co.th}
      BACKEND_BASE_URL: http://backend:8000
      POLICY_VERSION: ${POLICY_VERSION:-v1.0}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # Monitoring stack  (start with --profile monitoring)
  # docker compose --profile monitoring up -d
  # ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pcc-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - default
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: pcc-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      INCIDENT_EMAIL: ${INCIDENT_EMAIL:-ai-report@precise.co.th}
    networks:
      - default
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    container_name: pcc-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: dark
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/litellm.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - default
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: pcc-redis-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pcc-postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:-postgresql://${POSTGRES_USER:-pcc_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pcc_ai}?sslmode=disable}
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - monitoring

volumes:
  postgres_data:
  redis_data:
  open_webui_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  default:
  monitoring:
    name: pcc-monitoring
