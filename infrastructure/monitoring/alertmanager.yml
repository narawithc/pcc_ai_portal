global:
  resolve_timeout: 5m
  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_USER}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "email-default"
  routes:
    - match:
        severity: critical
      receiver: "email-critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "email-default"
      repeat_interval: 4h

receivers:
  - name: "email-default"
    email_configs:
      - to: "${INCIDENT_EMAIL}"
        send_resolved: true
        headers:
          Subject: "[PCC AI Portal] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}"
        html: |
          <h2>{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}</h2>
          <p><b>Severity:</b> {{ .CommonLabels.severity }}</p>
          <p><b>Environment:</b> {{ .CommonLabels.environment }}</p>
          {{ range .Alerts }}
          <hr/>
          <p><b>Alert:</b> {{ .Annotations.summary }}</p>
          <p><b>Description:</b> {{ .Annotations.description }}</p>
          <p><b>Started:</b> {{ .StartsAt }}</p>
          {{ end }}

  - name: "email-critical"
    email_configs:
      - to: "${INCIDENT_EMAIL}"
        send_resolved: true
        headers:
          Subject: "[CRITICAL][PCC AI Portal] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}"
        html: |
          <h2 style="color:red">CRITICAL: {{ .GroupLabels.alertname }}</h2>
          <p><b>Environment:</b> {{ .CommonLabels.environment }}</p>
          {{ range .Alerts }}
          <hr/>
          <p><b>Alert:</b> {{ .Annotations.summary }}</p>
          <p><b>Description:</b> {{ .Annotations.description }}</p>
          <p><b>Started:</b> {{ .StartsAt }}</p>
          {{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
