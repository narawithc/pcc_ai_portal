# LiteLLM Proxy Config — PCC AI Portal
#
# model_list is intentionally empty.
# Add models manually via the LiteLLM Admin UI (http://localhost:4000/ui)
# or via API after deployment — models are persisted in the database.
#
# STORE_MODEL_IN_DB=True is set in docker-compose, so any model added
# through the UI will survive container restarts.

model_list: []

# ── General Settings ──────────────────────────────────────────
litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 3600
  max_input_tokens: 100000
  success_callback: ["webhook"]
  failure_callback: ["webhook"]

# ── Guardrails (pre_call hooks → backend) ────────────────────
guardrails:
  - guardrail_name: "thai-pii-detector"
    litellm_params:
      guardrail: generic_guardrail_api
      mode: "pre_call"
      api_base: "http://backend:8000/guardrails"
      default_on: true

  - guardrail_name: "data-classifier"
    litellm_params:
      guardrail: generic_guardrail_api
      mode: "pre_call"
      api_base: "http://backend:8000/classifier"
      default_on: true

# ── Router Settings ───────────────────────────────────────────
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  retry_after: 5

# ── General Proxy Settings ────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  ui_access_mode: "admin_only"
  store_model_in_db: true
  disable_spend_logs: false
